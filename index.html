<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Marine Ecosystem Builder</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #001a33;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        /* ── Centre Fabric's wrapper in the viewport ── */
        .canvas-container {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            box-shadow: 0 0 0 2px rgba(126,207,255,0.18), 0 0 40px rgba(0,0,0,0.6);
        }

        /* ── Sidebar toggle (hamburger) ── */
        #sidebar-toggle {
            position: fixed;
            top: 10px; left: 10px;
            z-index: 400;
            width: 38px; height: 38px;
            background: rgba(0,10,30,0.92);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #7ecfff;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }
        #sidebar-toggle:hover { background: rgba(58,158,255,0.3); }

        /* On desktop the toggle is hidden — sidebar always open */
        @media (min-width: 768px) { #sidebar-toggle { display: none; } }

        /* ── Sidebar ── */
        #controls {
            position: fixed;
            top: 10px; left: 10px;
            z-index: 300;
            background: rgba(0, 10, 30, 0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 200px;
            max-height: calc(100dvh - 20px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            /* Mobile: hidden until toggled */
            display: none;
        }
        /* Desktop: always visible */
        @media (min-width: 768px) { #controls { display: block !important; left: 10px; top: 10px; } }
        #controls.open { display: block; }

        #controls h3 {
            font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 8px; color: #7ecfff;
        }

        #button-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 10px;
        }

        #button-container button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 6px;
            padding: 10px 4px; font-size: 11px;
            cursor: pointer; transition: background 0.15s;
            text-align: center; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
            -webkit-tap-highlight-color: transparent;
        }
        #button-container button:hover,
        #button-container button:active { background: rgba(126,207,255,0.25); }

        hr { border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 8px 0; }

        /* ── Overlay toggle ── */
        #overlay-controls { margin-top: 2px; }
        #overlay-controls .section-label {
            font-size: 11px; color: #7ecfff; font-weight: 600;
            display: block; margin-bottom: 5px;
        }
        .overlay-tabs { display: flex; gap: 5px; margin-bottom: 8px; }
        .overlay-tab {
            flex: 1; padding: 7px 4px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.07);
            color: #ccc; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .overlay-tab:hover  { background: rgba(126,207,255,0.15); }
        .overlay-tab.active { background: rgba(58,158,255,0.3); border-color: #3a9eff; color: #7ecfff; }

        #overlay-opacity-row { display: flex; flex-direction: column; gap: 3px; }
        #overlay-opacity-row label { font-size: 11px; color: rgba(255,255,255,0.6); }
        #overlay-opacity { width: 100%; accent-color: #3a9eff; height: 20px; }
        #opacity-display { font-size: 11px; color: rgba(255,255,255,0.5); text-align: right; }

        /* ── Action row ── */
        .action-row { display: flex; flex-direction: column; gap: 5px; margin-top: 2px; }
        .action-row button {
            width: 100%; padding: 9px; border-radius: 6px; border: none;
            cursor: pointer; font-size: 12px; font-weight: 600;
            transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
        }
        .action-row button:hover { opacity: 0.85; }
        #btn-reset { background: #8b0000; color: #fff; }
        #btn-reset-view { background: rgba(255,255,255,0.1); color: #7ecfff; border: 1px solid rgba(126,207,255,0.3) !important; }

        /* ── STAGING BAR (bottom) ── */
        /* Always rendered; visibility controlled by .active */
        #staging-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 350;
            background: rgba(0, 8, 24, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(58,158,255,0.35);
            padding: 10px 16px;
            /* safe area for phones with home bar */
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: none;
        }
        #staging-bar.active { display: block; }

        .staging-bar-hint {
            text-align: center;
            font-size: 11px;
            color: #7ecfff;
            margin-bottom: 8px;
        }

        .staging-layer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .staging-end-label {
            font-size: 10px;
            color: rgba(255,255,255,0.45);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .staging-slider-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        #layer-slider {
            width: 100%; accent-color: #3a9eff;
            height: 24px; cursor: pointer;   /* taller for touch */
        }
        #layer-label {
            text-align: center; font-size: 11px;
            font-weight: 700; color: #7ecfff; min-height: 14px;
        }

        .staging-actions {
            display: flex;
            gap: 10px;
        }
        .staging-actions button {
            flex: 1; padding: 13px 8px;
            border-radius: 8px; border: none;
            font-size: 14px; font-weight: 700;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.15s;
        }
        .staging-actions button:active { opacity: 0.8; }
        #btn-cancel-place  { background: rgba(255,255,255,0.12); color: #fff; }
        #btn-confirm-place { background: #2ecc71; color: #fff; }

        /* ── QR Code ── */
        #qrcode {
            position: fixed; bottom: 10px; right: 10px;
            z-index: 200; background: white;
            padding: 6px; border-radius: 6px;
        }
        @media (max-width: 480px) { #qrcode { display: none; } }

        canvas { display: block; }
    </style>
</head>
<body>

<!-- Always-visible hamburger (mobile only) -->
<button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<!-- ── Sidebar ── -->
<div id="controls">
    <h3>🌊 Marine Life</h3>
    <div id="button-container"></div>

    <hr>

    <div id="overlay-controls">
        <span class="section-label">🖼 Overlay Image</span>
        <div class="overlay-tabs">
            <button id="btn-overlay-color"   class="overlay-tab active" onclick="toggleOverlay('color')">🎨 Color</button>
            <button id="btn-overlay-outline" class="overlay-tab"        onclick="toggleOverlay('outline')">✏️ Outline</button>
        </div>
        <div id="overlay-opacity-row">
            <label for="overlay-opacity">Transparency</label>
            <input
                type="range" id="overlay-opacity" min="0" max="1" step="0.05" value="0.5"
                oninput="setOverlayOpacity(this.value); document.getElementById('opacity-display').textContent = Math.round(this.value*100)+'%';"
            />
            <span id="opacity-display">50%</span>
        </div>
    </div>

    <hr>
    <div class="action-row">
        <button id="btn-reset-view" onclick="resetZoom()">🔍 Reset View</button>
        <button id="btn-reset" onclick="clearOcean()">⚠ Reset All</button>
    </div>
</div>

<!-- ── Bottom staging bar (appears when placing) ── -->
<div id="staging-bar">
    <div class="staging-bar-hint">
        Move &amp; resize your creature, pick a layer, then <strong>Place It</strong>
    </div>
    <div class="staging-layer-row">
        <span class="staging-end-label">◀ Back</span>
        <div class="staging-slider-wrap">
            <input type="range" id="layer-slider" min="1" max="1" value="1"
                   oninput="onLayerSliderInput(this.value)">
            <div id="layer-label">Front</div>
        </div>
        <span class="staging-end-label">Front ▶</span>
    </div>
    <div class="staging-actions">
        <button id="btn-cancel-place"  onclick="cancelPlace()">✖ Cancel</button>
        <button id="btn-confirm-place" onclick="confirmPlace()">✅ Place It!</button>
    </div>
</div>

<canvas id="oceanCanvas"></canvas>
<div id="qrcode"></div>

<script src="main.js"></script>
</body>
</html>
