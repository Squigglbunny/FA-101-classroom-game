<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marine Ecosystem Builder</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            background: #001a33;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ── Sidebar ── */
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 10, 30, 0.88);
            backdrop-filter: blur(8px);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 210px;
            max-height: calc(100vh - 20px);
            overflow-y: auto;
        }

        #controls h3 {
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #7ecfff;
        }

        #button-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 10px;
        }

        #button-container button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 6px;
            padding: 7px 4px;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.15s;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #button-container button:hover { background: rgba(126,207,255,0.25); }

        hr { border: none; border-top: 1px solid rgba(255,255,255,0.12); margin: 8px 0; }

        /* Staging banner */
        #staging-banner {
            display: none;
            background: rgba(58,158,255,0.2);
            border: 1px solid #3a9eff;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 11px;
            color: #7ecfff;
            text-align: center;
            line-height: 1.5;
        }
        #staging-banner.active { display: block; }

        /* Layer slider row — replaces Front/Back buttons */
        #staging-depth-row {
            display: none;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }
        #staging-depth-row.active { display: flex; }

        #staging-depth-row label {
            font-size: 11px;
            color: #7ecfff;
            font-weight: 600;
        }

        #layer-slider {
            width: 100%;
            accent-color: #3a9eff;
            cursor: pointer;
        }

        #staging-depth-row .slider-ends {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: rgba(255,255,255,0.45);
        }

        #layer-label {
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: #7ecfff;
            min-height: 16px;
        }

        #btn-confirm-place {
            display: none;
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            background: #2ecc71;
            color: #fff;
            margin-bottom: 5px;
        }
        #btn-confirm-place.active { display: block; }

        #btn-cancel-place {
            display: none;
            width: 100%;
            padding: 7px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255,255,255,0.12);
            color: #fff;
            margin-bottom: 8px;
        }
        #btn-cancel-place.active { display: block; }

        .action-row { display: flex; flex-direction: column; gap: 5px; }

        .action-row button {
            width: 100%;
            padding: 7px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .action-row button:hover { opacity: 0.85; }

        #btn-reset { background: #8b0000; color: #fff; }

        /* ── QR Code ── */
        #qrcode {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 100;
            background: white;
            padding: 6px;
            border-radius: 6px;
        }

        canvas { display: block; }
    </style>
</head>
<body>

<!-- ── Sidebar ── -->
<div id="controls">
    <h3>🌊 Marine Life</h3>
    <div id="button-container"></div>

    <!-- Shown while a staging object is on canvas -->
    <div id="staging-banner">
        Position your creature, choose a layer, then click <strong>Place It</strong>!
    </div>

    <!-- Layer position slider — visible only while staging -->
    <div id="staging-depth-row">
        <label>Layer Position:</label>
        <input
            type="range"
            id="layer-slider"
            min="1"
            max="1"
            value="1"
            oninput="onLayerSliderInput(this.value)"
        />
        <div id="layer-label">Front</div>
        <div class="slider-ends">
            <span>◀ Back</span>
            <span>Front ▶</span>
        </div>
    </div>

    <button id="btn-confirm-place" onclick="confirmPlace()">✅ Place It!</button>
    <button id="btn-cancel-place"  onclick="cancelPlace()">✖ Cancel</button>

    <hr>
    <div id="overlay-controls" style="margin-top: 8px;">
        <label for="overlay-opacity" style="font-size:11px; color:#7ecfff; font-weight:600; display:block; margin-bottom:4px;">Overlay Transparency:</label>
        <input
            type="range"
            id="overlay-opacity"
            min="0"
            max="1"
            step="0.1"
            value="0.5"
            oninput="setOverlayOpacity(this.value); document.getElementById('opacity-display').textContent = Math.round(this.value * 100) + '%';"
            style="width: 100%; accent-color: #3a9eff;"
        />
        <span id="opacity-display" style="font-size:11px; color:rgba(255,255,255,0.6);">50%</span>
    </div>

    <hr>
    <div class="action-row">
        <button id="btn-reset" onclick="clearOcean()">⚠ Reset All</button>
    </div>
</div>

<canvas id="oceanCanvas"></canvas>
<div id="qrcode"></div>

<script src="main.js"></script>
</body>
</html>
